<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>space-invaders</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="all">
            <div id="game-info">
                <p>score: <span id="score">0</span></p>
                <p>time: <span id="time">0.00</span></p>
                <p>lives: <span id="lives">♥ ♥ ♥</span></p>
            </div>
            
            <div id="gameCanvas">
                <svg id="player" viewBox="0 0 324 276">
                    <use href="/source/player.svg"></use>
            </svg>
        </div>
        
        <div id="msg">press ← → to move and [SPACE] to shoot <br />press [P] to pause/resume and [R] to restart</div>
        
    </div>
        <div class="controls hidden">
            <button id="restartBtn">restart [R]</button>
            <button id="resumeBtn">resume [P]</button>
    </div>
    </body>
    <script src="main.js"></script>  
</html>
